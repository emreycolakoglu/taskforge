version: "3.8"
services:
  taskforge:
    image: emreyc/taskforge:latest
    build: .
    ports:
      - "4321:3000"
    volumes:
      - taskforge-data:/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=file:/data/taskforge.db
      - CORS_ORIGIN=*

volumes:
  taskforge-data: