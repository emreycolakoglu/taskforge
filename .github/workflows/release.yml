name: release

on:
  workflow_run:
    workflows: [ci]
    types: [completed]
    branches: [main]

jobs:
  bump-version:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
    outputs:
      next_version: ${{ steps.bump.outputs.next_version }}
      short_sha: ${{ steps.bump.outputs.short_sha }}
      skip: ${{ steps.bump.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: main

      - name: Compute next version
        id: bump
        run: |
          set -euo pipefail
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            NEXT_VERSION="1.0.0"
          else
            # Check if the current commit is already tagged — skip if so
            TAGGED_SHA=$(git rev-list -n 1 "$LAST_TAG" 2>/dev/null || echo "")
            CURRENT_SHA=$(git rev-parse HEAD)
            if [ "$TAGGED_SHA" = "$CURRENT_SHA" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "next_version=${LAST_TAG#v}" >> "$GITHUB_OUTPUT"
              echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
              echo "Head already tagged as $LAST_TAG — skipping release."
              exit 0
            fi
            # Strip leading v, split on dots
            BASE="${LAST_TAG#v}"
            MAJOR=$(echo "$BASE" | cut -d. -f1)
            MINOR=$(echo "$BASE" | cut -d. -f2)
            PATCH=$(echo "$BASE" | cut -d. -f3)
            PATCH=$((PATCH + 1))
            if [ "$PATCH" -gt 99 ]; then
              PATCH=0
              MINOR=$((MINOR + 1))
            fi
            if [ "$MINOR" -gt 99 ]; then
              MINOR=0
              MAJOR=$((MAJOR + 1))
            fi
            NEXT_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "next_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "Next version: v$NEXT_VERSION (sha $SHORT_SHA)"

      - name: Push tag
        if: steps.bump.outputs.skip != 'true'
        run: |
          git tag "v${{ steps.bump.outputs.next_version }}"
          git push origin "v${{ steps.bump.outputs.next_version }}"

      - name: Generate changelog
        if: steps.bump.outputs.skip != 'true'
        id: changelog
        run: |
          set -euo pipefail
          PREV_TAG=$(git describe --tags --abbrev=0 "v${{ steps.bump.outputs.next_version }}"^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi
          {
            echo "body<<EOF"
            echo "## What's new"
            echo
            git log --pretty=format:"- %s (%h)" "$RANGE" | grep -v -iE "^(chore|test): bump|^[a-f0-9]+ - (Merge pull request|Merge branch)" || true
            echo
            echo
            echo "**Full changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG:-$(git rev-list --max-parents=0 HEAD | head -1)}...v${{ steps.bump.outputs.next_version }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.bump.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.bump.outputs.next_version }}" \
            --title "v${{ steps.bump.outputs.next_version }}" \
            --notes "${{ steps.changelog.outputs.body }}" \
            --target main

  docker:
    needs: bump-version
    if: needs.bump-version.outputs.skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive tag variants
        id: tags
        env:
          NEXT_VERSION: ${{ needs.bump-version.outputs.next_version }}
        run: |
          set -euo pipefail
          MAJOR=$(echo "$NEXT_VERSION" | cut -d. -f1)
          MINOR=$(echo "$NEXT_VERSION" | cut -d. -f1,2)
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            emreyc/taskforge:latest
            emreyc/taskforge:${{ needs.bump-version.outputs.next_version }}
            emreyc/taskforge:${{ steps.tags.outputs.minor }}
            emreyc/taskforge:${{ steps.tags.outputs.major }}
            emreyc/taskforge:sha-${{ needs.bump-version.outputs.short_sha }}