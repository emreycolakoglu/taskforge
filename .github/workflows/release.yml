name: release

on:
  push:
    branches: [main]

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      next_version: ${{ steps.bump.outputs.next_version }}
      short_sha: ${{ steps.bump.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute next version
        id: bump
        run: |
          set -euo pipefail
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            NEXT_VERSION="1.0.0"
          else
            # Strip leading v, split on dots
            BASE="${LAST_TAG#v}"
            MAJOR=$(echo "$BASE" | cut -d. -f1)
            MINOR=$(echo "$BASE" | cut -d. -f2)
            PATCH=$(echo "$BASE" | cut -d. -f3)
            PATCH=$((PATCH + 1))
            if [ "$PATCH" -gt 99 ]; then
              PATCH=0
              MINOR=$((MINOR + 1))
            fi
            if [ "$MINOR" -gt 99 ]; then
              MINOR=0
              MAJOR=$((MAJOR + 1))
            fi
            NEXT_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "next_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "Next version: v$NEXT_VERSION (sha $SHORT_SHA)"

      - name: Push tag
        run: |
          git tag "v${{ steps.bump.outputs.next_version }}"
          git push origin "v${{ steps.bump.outputs.next_version }}"

  docker:
    needs: bump-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive tag variants
        id: tags
        env:
          NEXT_VERSION: ${{ needs.bump-version.outputs.next_version }}
        run: |
          set -euo pipefail
          MAJOR=$(echo "$NEXT_VERSION" | cut -d. -f1)
          MINOR=$(echo "$NEXT_VERSION" | cut -d. -f1,2)
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            emreyc/taskforge:latest
            emreyc/taskforge:${{ needs.bump-version.outputs.next_version }}
            emreyc/taskforge:${{ steps.tags.outputs.minor }}
            emreyc/taskforge:${{ steps.tags.outputs.major }}
            emreyc/taskforge:sha-${{ needs.bump-version.outputs.short_sha }}