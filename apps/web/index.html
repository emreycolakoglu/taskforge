<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <!--
    Applies to the whole SPA, which is correct: every route except /public/*
    redirects to /login anyway, and public task pages are meant to be reachable
    by anyone holding the link — not surfaced in search results. Flip this only
    if you deliberately want published tasks indexed.
  -->
  <meta name="robots" content="noindex, nofollow" />
  <title>TaskForge</title>
  <!--
    Two entries because browsers differ on what they will pick up: the .ico is the
    zero-config fallback every browser requests at /favicon.ico anyway, and the 192 PNG is
    what Chrome and Firefox reach for on high-DPI tabs and bookmark tiles.
  -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="32x32" />
  <link rel="icon" type="image/png" href="/icons/pwa-192.png" sizes="192x192" />
  <!--
    PWA install support. The <link rel="manifest"> and the service-worker registration are
    injected at build time by vite-plugin-pwa (see vite.config.ts) — the tags below are the
    ones it does not handle:

    - theme-color paints the OS title/status bar before the manifest is parsed, so the
      window does not flash white on cold start. Matches Onyx, the app canvas.
    - iOS ignores the manifest's icons array entirely and only reads apple-touch-icon, so
      without this line an iOS home-screen icon is a blurry screenshot of the page.
    - The status bar blends into the dark canvas rather than sitting in a white strip.

    No apple-mobile-web-app-title: iOS falls back to <title>, which is already "TaskForge".
  -->
  <meta name="theme-color" content="#08090a" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
